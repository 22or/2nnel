<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2nnel Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #0d1117; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .brand-accent { color: #58a6ff; }
    .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: #e6edf3; }
    .stat-label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
    .client-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
    .client-header { background: #1c2128; border-bottom: 1px solid #30363d; border-radius: 8px 8px 0 0; }
    .tunnel-row { border-bottom: 1px solid #21262d; }
    .tunnel-row:last-child { border-bottom: none; }
    .badge-http { background: #1f6feb; }
    .badge-tcp  { background: #388bfd22; color: #79c0ff; border: 1px solid #388bfd55; }
    .bytes-label { color: #8b949e; font-size: 0.8rem; }
    .active-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #3fb950; margin-right: 6px; }
    .active-dot.zero { background: #484f58; }
    .uptime-badge { font-size: 0.75rem; color: #8b949e; }
    #status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #3fb950; margin-right: 4px; transition: background 0.3s; }
    #status-dot.disconnected { background: #f85149; }
    .empty-state { color: #484f58; }
    .btn-disconnect { font-size: 0.75rem; padding: 2px 10px; }
    .btn-remove-tunnel { font-size: 0.7rem; padding: 1px 8px; }
    .modal-dark { background: #161b22; border: 1px solid #30363d; }
    .modal-dark .modal-header { border-bottom: 1px solid #30363d; }
    .modal-dark .modal-footer { border-top: 1px solid #30363d; }
    .form-control-dark { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; }
    .form-control-dark:focus { background: #0d1117; border-color: #58a6ff; color: #e6edf3; box-shadow: 0 0 0 2px rgba(88,166,255,.25); }
    .form-select-dark { background-color: #0d1117; border: 1px solid #30363d; color: #e6edf3; }
    .form-select-dark:focus { border-color: #58a6ff; box-shadow: 0 0 0 2px rgba(88,166,255,.25); }
    .tunnel-name { font-family: monospace; font-weight: 600; }
    .endpoint { font-family: monospace; color: #79c0ff; font-size: 0.85rem; }
    a.endpoint { text-decoration: none; }
    a.endpoint:hover { text-decoration: underline; color: #a5d6ff; }
    .local-addr { font-family: monospace; color: #8b949e; font-size: 0.8rem; }
    .metric-val { font-weight: 600; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-2" style="background:#161b22; border-bottom:1px solid #30363d;">
  <span class="navbar-brand mb-0">
    <span class="brand-accent">2</span>nnel
    <span class="text-secondary fw-normal ms-2" style="font-size:0.85rem;">Admin</span>
  </span>
  <div class="d-flex align-items-center gap-3">
    <span id="uptime-badge" class="uptime-badge">uptime: —</span>
    <span>
      <span id="status-dot" class="disconnected"></span>
      <span id="status-text" style="font-size:0.8rem; color:#8b949e;">connecting…</span>
    </span>
  </div>
</nav>

<div class="container-fluid px-4 py-4">

  <!-- Stat cards -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="stat-card p-3">
        <div class="stat-value" id="stat-clients">—</div>
        <div class="stat-label">Clients</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card p-3">
        <div class="stat-value" id="stat-http">—</div>
        <div class="stat-label">HTTP Tunnels</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card p-3">
        <div class="stat-value" id="stat-tcp">—</div>
        <div class="stat-label">TCP Tunnels</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card p-3">
        <div class="stat-value" id="stat-bytes">—</div>
        <div class="stat-label">Total Traffic</div>
      </div>
    </div>
  </div>

  <!-- Deployed apps -->
  <div id="deployed-container"></div>

  <!-- Client cards -->
  <div id="clients-container">
    <div class="empty-state text-center py-5">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-3">
        <path d="M8.5 12.5l2 2 5-5"/>
        <circle cx="12" cy="12" r="9"/>
      </svg>
      <p>No clients connected.</p>
    </div>
  </div>

</div>

<!-- Add Tunnel Modal -->
<div class="modal fade" id="addTunnelModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content modal-dark text-light">
      <div class="modal-header">
        <h5 class="modal-title">Add Tunnel</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="modal-client-id">
        <div class="mb-3">
          <label class="form-label text-secondary small">Tunnel Name</label>
          <input id="t-name" type="text" class="form-control form-control-dark" placeholder="myapp">
        </div>
        <div class="mb-3">
          <label class="form-label text-secondary small">Type</label>
          <select id="t-type" class="form-select form-select-dark" onchange="toggleTunnelFields()">
            <option value="http">HTTP</option>
            <option value="tcp">TCP</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label text-secondary small">Local Address</label>
          <input id="t-local" type="text" class="form-control form-control-dark" placeholder="localhost:3000">
        </div>
        <div id="t-subdomain-group" class="mb-3">
          <label class="form-label text-secondary small">Subdomain <span class="text-secondary">(leave blank to use name)</span></label>
          <input id="t-subdomain" type="text" class="form-control form-control-dark" placeholder="myapp">
        </div>
        <div id="t-port-group" class="mb-3 d-none">
          <label class="form-label text-secondary small">Remote Port <span class="text-secondary">(leave blank for auto)</span></label>
          <input id="t-port" type="number" class="form-control form-control-dark" placeholder="auto">
        </div>
        <div id="modal-error" class="text-danger small d-none"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="submitAddTunnel()">Add</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token') || '';
const authQ = token ? '?token=' + encodeURIComponent(token) : '';

function fmtBytes(n) {
  if (n >= 1073741824) return (n / 1073741824).toFixed(1) + ' GB';
  if (n >= 1048576)    return (n / 1048576).toFixed(1) + ' MB';
  if (n >= 1024)       return (n / 1024).toFixed(1) + ' KB';
  return n + ' B';
}

function dirBasename(p) {
  if (!p) return '';
  const parts = p.replace(/\\/g, '/').split('/').filter(Boolean);
  return parts[parts.length - 1] || p;
}

function renderTunnel(t) {
  const dotCls = t.active_conns > 0 ? 'active-dot' : 'active-dot zero';
  const badge = t.type === 'http'
    ? `<span class="badge badge-http">HTTP</span>`
    : `<span class="badge badge-tcp">TCP</span>`;
  const reqs = t.type === 'http'
    ? `<span class="metric-val">${t.requests}</span> <span class="bytes-label">req</span>`
    : '';

  const dirControls = t.type === 'http' ? (
    t.can_promote
      ? `<span class="local-addr" title="${escHtml(t.dir)}" style="cursor:default;">📁 ${escHtml(dirBasename(t.dir))}</span>
         <button class="btn btn-outline-secondary btn-remove-tunnel"
           onclick="setTunnelDir('${escHtml(t.client_id)}','${escHtml(t.name)}','${escHtml(t.dir||'')}')">Edit Dir</button>
         <button class="btn btn-outline-warning btn-remove-tunnel"
           onclick="promoteTunnel('${escHtml(t.client_id)}','${escHtml(t.name)}',this)">Promote</button>`
      : `<button class="btn btn-outline-secondary btn-remove-tunnel"
           onclick="setTunnelDir('${escHtml(t.client_id)}','${escHtml(t.name)}','')">Set Dir</button>`
  ) : '';

  return `
    <div class="tunnel-row px-4 py-2 d-flex flex-wrap align-items-center gap-3">
      <span class="${dotCls}"></span>
      <span class="tunnel-name">${escHtml(t.name)}</span>
      ${badge}
      ${t.type === 'http'
          ? `<a class="endpoint" href="${escHtml(t.endpoint)}" target="_blank" rel="noopener">${escHtml(t.endpoint)}</a>`
          : `<span class="endpoint">${escHtml(t.endpoint)}</span>`}
      <span class="local-addr">→ ${escHtml(t.local_addr)}</span>
      <span class="ms-auto d-flex gap-3 align-items-center flex-wrap">
        <span><span class="bytes-label">↓</span> <span class="metric-val">${t.bytes_in_human}</span></span>
        <span><span class="bytes-label">↑</span> <span class="metric-val">${t.bytes_out_human}</span></span>
        ${reqs}
        ${t.active_conns > 0 ? `<span class="badge bg-success">${t.active_conns} active</span>` : ''}
        ${dirControls}
        <button class="btn btn-outline-secondary btn-remove-tunnel"
          onclick="removeTunnel('${escHtml(t.client_id)}','${escHtml(t.name)}')">Remove</button>
      </span>
    </div>`;
}

function renderClient(c) {
  const tunnelRows = c.tunnels.length
    ? c.tunnels.map(renderTunnel).join('')
    : `<div class="px-4 py-2 text-secondary" style="font-size:0.85rem;">No tunnels registered.</div>`;

  return `
    <div class="client-card mb-3">
      <div class="client-header px-4 py-2 d-flex align-items-center gap-3 flex-wrap">
        <span class="font-monospace fw-bold" style="color:#e6edf3;">${escHtml(c.short_id)}</span>
        <span class="text-secondary" style="font-size:0.8rem;">${escHtml(c.remote)}</span>
        <span class="text-secondary" style="font-size:0.8rem;">· connected ${escHtml(c.connected_ago)}</span>
        <span class="ms-auto d-flex gap-2">
          <button class="btn btn-outline-primary btn-disconnect"
            onclick="openAddTunnel('${escHtml(c.id)}')">+ Tunnel</button>
          <button class="btn btn-outline-danger btn-disconnect"
            onclick="disconnect('${escHtml(c.id)}')">Disconnect</button>
        </span>
      </div>
      ${tunnelRows}
    </div>`;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function renderDeployedApp(app) {
  const logsHtml = (app.recent_logs && app.recent_logs.length)
    ? app.recent_logs.map(l => `<div style="font-family:monospace;font-size:0.75rem;color:#8b949e;">${escHtml(l)}</div>`).join('')
    : '<div style="font-size:0.75rem;color:#484f58;">No output yet.</div>';
  return `
    <div class="client-card mb-3">
      <div class="client-header px-4 py-2 d-flex align-items-center gap-3 flex-wrap">
        <span class="badge bg-success">DEPLOYED</span>
        <span class="font-monospace fw-bold" style="color:#e6edf3;">${escHtml(app.name)}</span>
        <a class="endpoint" href="${escHtml(app.public_url)}" target="_blank" rel="noopener">${escHtml(app.public_url)}</a>
        <span class="text-secondary" style="font-size:0.8rem;">port ${app.port} · ${app.requests} req</span>
        <span class="ms-auto">
          <button class="btn btn-outline-danger btn-disconnect"
            onclick="stopDeploy('${escHtml(app.name)}')">Stop</button>
        </span>
      </div>
      <div class="px-4 py-2" style="background:#0d1117; border-radius:0 0 8px 8px;">${logsHtml}</div>
    </div>`;
}

function render(data) {
  // Stats
  document.getElementById('stat-clients').textContent = data.totals.clients;
  document.getElementById('stat-http').textContent    = data.totals.http_tunnels;
  document.getElementById('stat-tcp').textContent     = data.totals.tcp_tunnels;
  const totalBytes = (data.totals.total_bytes_in || 0) + (data.totals.total_bytes_out || 0);
  document.getElementById('stat-bytes').textContent   = fmtBytes(totalBytes);

  // Uptime
  const u = data.uptime_seconds;
  const h = Math.floor(u / 3600), m = Math.floor((u % 3600) / 60), sec = Math.floor(u % 60);
  document.getElementById('uptime-badge').textContent =
    'uptime: ' + (h ? h+'h '+m+'m' : m ? m+'m '+sec+'s' : sec+'s');

  // Deployed apps
  const deployedContainer = document.getElementById('deployed-container');
  if (data.deployed_apps && data.deployed_apps.length > 0) {
    deployedContainer.innerHTML = data.deployed_apps.map(renderDeployedApp).join('');
  } else {
    deployedContainer.innerHTML = '';
  }

  // Clients
  const container = document.getElementById('clients-container');
  if (!data.clients || data.clients.length === 0) {
    container.innerHTML = `
      <div class="empty-state text-center py-5">
        <p class="mb-0">No clients connected.</p>
      </div>`;
  } else {
    container.innerHTML = data.clients.map(renderClient).join('');
  }
}

async function setTunnelDir(clientId, tunnelName, currentDir) {
  const dir = prompt(
    'Project directory for "' + tunnelName + '" on this machine:\n(empty to clear)',
    currentDir
  );
  if (dir === null) return;
  try {
    const r = await fetch(
      '/_2nnel/clients/' + encodeURIComponent(clientId) + '/tunnels/' + encodeURIComponent(tunnelName) + '/dir' + authQ,
      {method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({dir})}
    );
    if (!r.ok) alert('Error: ' + await r.text());
  } catch(e) { alert('Error: ' + e); }
}

async function promoteTunnel(clientId, name, btn) {
  if (!confirm('Promote "' + name + '" to a permanent deployed app?\n\nThe server will build and run it with Docker + Nixpacks.\nThis may take a few minutes.')) return;
  btn.disabled = true;
  btn.textContent = 'Building…';
  try {
    const r = await fetch(
      '/_2nnel/clients/' + encodeURIComponent(clientId) + '/tunnels/' + encodeURIComponent(name) + '/promote' + authQ,
      {method: 'POST'}
    );
    if (!r.ok) {
      alert('Error: ' + await r.text());
      btn.disabled = false;
      btn.textContent = 'Promote';
    } else {
      btn.textContent = 'Building… (watch deployed section)';
    }
  } catch(e) {
    alert('Error: ' + e);
    btn.disabled = false;
    btn.textContent = 'Promote';
  }
}

async function stopDeploy(name) {
  if (!confirm('Stop deployed app "' + name + '"? This will stop the container and remove its files.')) return;
  try {
    const r = await fetch('/_2nnel/promote/' + encodeURIComponent(name) + authQ, {method:'DELETE'});
    if (!r.ok) alert('Error: ' + await r.text());
  } catch(e) { alert('Error: ' + e); }
}

async function disconnect(id) {
  if (!confirm('Disconnect client ' + id.slice(0,8) + '?')) return;
  try {
    const r = await fetch('/_2nnel/clients/' + encodeURIComponent(id) + '/disconnect' + authQ, {method:'POST'});
    if (!r.ok) alert('Error: ' + await r.text());
  } catch(e) { alert('Error: ' + e); }
}

async function removeTunnel(clientId, tunnelName) {
  if (!confirm('Remove tunnel "' + tunnelName + '"?')) return;
  try {
    const r = await fetch('/_2nnel/clients/' + encodeURIComponent(clientId) + '/tunnels/' + encodeURIComponent(tunnelName) + authQ, {method:'DELETE'});
    if (!r.ok) alert('Error: ' + await r.text());
  } catch(e) { alert('Error: ' + e); }
}

let addTunnelModal;
function openAddTunnel(clientId) {
  document.getElementById('modal-client-id').value = clientId;
  document.getElementById('t-name').value = '';
  document.getElementById('t-local').value = '';
  document.getElementById('t-subdomain').value = '';
  document.getElementById('t-port').value = '';
  document.getElementById('t-type').value = 'http';
  document.getElementById('modal-error').classList.add('d-none');
  toggleTunnelFields();
  if (!addTunnelModal) addTunnelModal = new bootstrap.Modal(document.getElementById('addTunnelModal'));
  addTunnelModal.show();
}

function toggleTunnelFields() {
  const isTCP = document.getElementById('t-type').value === 'tcp';
  document.getElementById('t-subdomain-group').classList.toggle('d-none', isTCP);
  document.getElementById('t-port-group').classList.toggle('d-none', !isTCP);
}

async function submitAddTunnel() {
  const clientId = document.getElementById('modal-client-id').value;
  const name     = document.getElementById('t-name').value.trim();
  const type     = document.getElementById('t-type').value;
  const localAddr = document.getElementById('t-local').value.trim();
  const subdomain = document.getElementById('t-subdomain').value.trim();
  const portVal   = document.getElementById('t-port').value.trim();
  const errEl     = document.getElementById('modal-error');

  if (!name || !localAddr) {
    errEl.textContent = 'Name and local address required.';
    errEl.classList.remove('d-none');
    return;
  }

  const body = { name, type, local_addr: localAddr };
  if (type === 'http') body.subdomain = subdomain || name;
  if (type === 'tcp' && portVal) body.remote_port = parseInt(portVal);

  try {
    const r = await fetch('/_2nnel/clients/' + encodeURIComponent(clientId) + '/tunnels' + authQ, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    if (r.ok) {
      addTunnelModal.hide();
    } else {
      errEl.textContent = await r.text();
      errEl.classList.remove('d-none');
    }
  } catch(e) {
    errEl.textContent = String(e);
    errEl.classList.remove('d-none');
  }
}

// SSE connection with auto-reconnect
let es;
function connect() {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  dot.className = 'disconnected';
  text.textContent = 'connecting…';

  es = new EventSource('/_2nnel/stream' + authQ);

  es.onopen = () => {
    dot.className = '';
    text.textContent = 'live';
  };

  es.onmessage = e => {
    try { render(JSON.parse(e.data)); } catch(err) { console.error(err); }
  };

  es.onerror = () => {
    dot.className = 'disconnected';
    text.textContent = 'reconnecting…';
    es.close();
    setTimeout(connect, 3000);
  };
}

connect();
</script>
</body>
</html>
